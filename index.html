<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Habits & Tracking</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:13px;background:#f4f6fb;color:#1a1f2e}

/* ── TOPBAR ── */
.topbar{background:#fff;border-bottom:1px solid #e8ecf4;padding:12px 22px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-shrink:0}
.topbar-left{display:flex;align-items:center;gap:12px}
.logo{display:flex;align-items:center;gap:9px}
.logo-icon{width:28px;height:28px;background:#534AB7;border-radius:7px;display:flex;align-items:center;justify-content:center}
.logo-icon i{font-size:15px;color:#fff}
.logo-text{font-size:14px;font-weight:600;color:#1a1f2e}
.period-hint{font-size:11px;color:#8492a6;padding-left:12px;border-left:1px solid #e8ecf4}
.topbar-right{display:flex;align-items:center;gap:10px;flex-shrink:0}
.seg-control{display:flex;border:1px solid #e0e4ef;border-radius:8px;overflow:hidden}
.seg-btn{padding:5px 14px;font-size:12px;cursor:pointer;background:#fff;color:#5a6478;border:none;border-right:1px solid #e0e4ef;font-family:inherit;display:flex;align-items:center;gap:5px}
.seg-btn:last-child{border-right:none}
.seg-btn.active{background:#EEEDFE;color:#534AB7;font-weight:500}
.btn-primary{display:flex;align-items:center;gap:5px;padding:6px 13px;border-radius:7px;border:1px solid #534AB7;background:#534AB7;color:#fff;cursor:pointer;font-size:12px;font-weight:500;font-family:inherit}
.btn-primary:hover{background:#3C3489}

/* ── CONTENT ── */
.content{padding:18px 22px;display:flex;flex-direction:column;gap:14px;overflow-y:auto;height:calc(100vh - 53px)}
.notice-banner{background:#fff4db;border:1px solid #f0d48a;color:#7a4c0a;border-radius:11px;padding:12px 14px;font-size:12px;line-height:1.5}
.notice-banner strong{color:#5f3b06}

/* ── METRICS ── */
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:11px}
.mc{background:#fff;border-radius:11px;padding:15px 17px;border:1px solid #e8ecf4}
.mc-label{font-size:10.5px;font-weight:500;text-transform:uppercase;letter-spacing:0.06em;color:#8492a6;margin-bottom:5px}
.mc-value{font-size:21px;font-weight:700;color:#1a1f2e;line-height:1.1}
.mc-sub{font-size:11px;color:#8492a6;margin-top:3px}

/* ── CARD ── */
.card{background:#fff;border-radius:11px;border:1px solid #e8ecf4}
.card-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;color:#8492a6;display:flex;align-items:center;gap:6px}
.card-title i{font-size:14px}

/* ── TABLE ── */
.tbl-wrap{overflow-x:auto}
table.data-tbl{width:100%;border-collapse:collapse;font-size:12px}
table.data-tbl thead tr{border-bottom:1px solid #e8ecf4;background:#f8fafc}
table.data-tbl th{padding:9px 12px;text-align:left;font-size:10.5px;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;color:#8492a6;white-space:nowrap}
table.data-tbl td{padding:9px 12px;color:#1a1f2e;border-bottom:1px solid #f3f4f8;vertical-align:middle}
table.data-tbl tr:last-child td{border-bottom:none}
table.data-tbl tr:hover td{background:#fafbfd}

/* ── DONE BTN ── */
.done-btn{display:inline-flex;align-items:center;gap:4px;font-size:11.5px;padding:4px 11px;border-radius:6px;border:1px solid #d0d5e0;background:#fff;color:#5a6478;cursor:pointer;font-family:inherit;white-space:nowrap}
.done-btn:hover{background:#f4f6fb}
.done-btn.is-done{background:#eaf3de;color:#3B6D11;border-color:#C0DD97;font-weight:500}
.done-btn.is-done:hover{background:#C0DD97}

/* ── WEEK DOTS ── */
.week-col{display:flex;flex-direction:column;gap:3px}
.week-lbl-row{display:flex;gap:3px}
.wl{width:16px;font-size:9px;text-align:center;color:#b0b8cc}
.week-dots{display:flex;gap:3px}
.wd{width:16px;height:16px;border-radius:4px;background:#f0f1f5;border:1px solid #e4e7ef;cursor:pointer;transition:background 0.1s;flex-shrink:0}
.wd:hover:not(.wdf){background:#e0e3ec}
.wd.wdd{background:#639922;border-color:#639922}
.wd.wdt{border-color:#534AB7}
.wd.wdf{opacity:0.35;cursor:default}

/* ── STREAK ── */
.streak-cell{display:flex;align-items:center;gap:5px;white-space:nowrap;font-weight:600}
.streak-cell .lbl{font-weight:400;color:#8492a6}

/* ── CHIP ── */
.chip{display:inline-flex;align-items:center;padding:3px 9px;border-radius:8px;font-weight:600;font-size:11px;white-space:nowrap;border:1px solid}
.item-meta{display:flex;flex-direction:column;gap:4px}
.item-name-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.item-summary{display:flex;flex-direction:column;gap:2px}
.item-summary strong{font-size:12px;color:#1a1f2e}
.item-summary span{font-size:11px;color:#8492a6}
.section-stack{display:flex;flex-direction:column;gap:16px}
.section-block{display:flex;flex-direction:column;gap:8px}
.section-head{display:flex;align-items:center;justify-content:space-between;gap:10px}
.section-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:#8492a6}
.section-count{font-size:11px;color:#97a1b3}

/* ── CALENDAR CARDS ── */
.cal-grid-wrap{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:12px;padding:17px}
.hcard{background:#fff;border-radius:11px;padding:14px 15px;border:1px solid #e8ecf4}
.hcard-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:9px;gap:8px}
.hcard-title{font-size:12.5px;font-weight:600;color:#1a1f2e;display:flex;align-items:center;gap:7px}
.hcard-title i{font-size:14px}
.cal-lbl{font-size:10.5px;color:#8492a6;margin-bottom:4px}
.cal-dow-row{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:2px}
.cal-dow{font-size:9px;text-align:center;color:#b0b8cc}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cd{width:100%;aspect-ratio:1;border-radius:3px;font-size:9px;display:flex;align-items:center;justify-content:center;color:#b0b8cc;background:#f4f6fb;border:1px solid #eaedf4;cursor:pointer;transition:background 0.1s}
.cd:hover:not(.cde):not(.cdf){background:#e0e4ef}
.cd.cdd{background:#639922;color:#fff;border-color:#639922}
.cd.cdt{border-color:#534AB7;color:#534AB7;font-weight:600}
.cd.cdt.cdd{border-color:#27500A;color:#fff}
.cd.cdd-tracking{background:#5d98b3;border-color:#5d98b3;color:#fff}
.cd.cdt.cdd-tracking{border-color:#1a5e78;color:#fff}
.cd.cde{background:transparent;border-color:transparent;cursor:default}
.cd.cdf{opacity:0.3;cursor:default}
.hcard-streak{font-size:11px;color:#8492a6;margin-top:9px;display:flex;align-items:center;gap:5px}
.hcard-streak strong{color:#1a1f2e}
.hcard-streak .tracking-ico{color:#1a5e78}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.38);display:flex;align-items:center;justify-content:center;z-index:200}
.modal{background:#fff;border-radius:12px;border:1px solid #e0e4ef;padding:22px 24px;width:360px;max-width:94vw;box-shadow:0 8px 32px rgba(0,0,0,0.12)}
.modal h2{font-size:14px;font-weight:600;color:#1a1f2e;margin-bottom:16px;display:flex;align-items:center;gap:7px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
.form-group{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
.form-group label{font-size:11px;font-weight:500;color:#5a6478;text-transform:uppercase;letter-spacing:0.04em}
.form-group input,.form-group select{padding:8px 10px;border:1px solid #d8dce8;border-radius:7px;font-size:12.5px;color:#1a1f2e;background:#fff;outline:none;font-family:inherit}
.form-group input:focus,.form-group select:focus{border-color:#534AB7;box-shadow:0 0 0 3px rgba(83,74,183,0.1)}
.form-group input:disabled,.form-group select:disabled{background:#f4f6fb;color:#97a1b3;cursor:not-allowed}
.btn-secondary{display:flex;align-items:center;gap:5px;padding:6px 13px;border-radius:7px;border:1px solid #d0d5e0;background:#fff;color:#1a1f2e;cursor:pointer;font-size:12px;font-weight:500;font-family:inherit}
.btn-secondary:hover{background:#f4f6fb}

/* ── EMPTY ── */
.empty-state{text-align:center;padding:40px;color:#8492a6}
.empty-state i{font-size:36px;display:block;margin-bottom:10px;opacity:0.3}

/* ── SETUP SCREEN ── */
.setup-screen{position:fixed;inset:0;background:#f4f6fb;display:flex;align-items:center;justify-content:center;z-index:300}
.setup-card{background:#fff;border-radius:14px;border:1px solid #e0e4ef;padding:32px 36px;width:400px;max-width:94vw;box-shadow:0 4px 24px rgba(0,0,0,0.08)}
.setup-card h2{font-size:16px;font-weight:600;color:#1a1f2e;margin-bottom:6px;display:flex;align-items:center;gap:9px}
.setup-card .sub{font-size:12px;color:#8492a6;margin-bottom:20px;line-height:1.5}
.setup-card .hint{font-size:10.5px;color:#b0b8cc;margin-top:3px}
.setup-error{color:#E24B4A;font-size:11.5px;margin-top:10px;display:none}

/* ── LOADING ── */
.loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px;color:#8492a6;gap:12px}
.spinner{width:28px;height:28px;border:3px solid #e8ecf4;border-top-color:#534AB7;border-radius:50%;animation:spin 0.7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── TOAST ── */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1a1f2e;color:#fff;padding:10px 20px;border-radius:8px;font-size:12px;z-index:400;opacity:0;transition:opacity 0.3s;pointer-events:none}
.toast.show{opacity:1}

/* ── GEAR BTN ── */
.gear-btn{background:none;border:none;cursor:pointer;color:#c8cfe0;font-size:16px;padding:4px;border-radius:5px;display:flex;align-items:center}
.gear-btn:hover{color:#534AB7}

/* ── EDIT MODE ── */
.edit-btn{display:flex;align-items:center;gap:5px;padding:5px 12px;border-radius:7px;border:1px solid #e0e4ef;background:#fff;color:#5a6478;cursor:pointer;font-size:12px;font-weight:500;font-family:inherit}
.edit-btn:hover{background:#f4f6fb}
.edit-btn.active{background:#EEEDFE;color:#534AB7;border-color:#534AB7;font-weight:600}
.move-btn{background:none;border:none;cursor:pointer;color:#b0b8cc;font-size:15px;padding:1px 3px;border-radius:4px;display:inline-flex;align-items:center;line-height:1}
.move-btn:hover:not(:disabled){color:#534AB7;background:#EEEDFE}
.move-btn:disabled{opacity:0.18;cursor:default}
.move-col{display:flex;flex-direction:column;gap:1px;align-items:center}
.hcard-edit-bar{display:flex;align-items:center;gap:4px;margin-left:auto}

/* ── INLINE EDIT BTN ── */
.inline-edit-btn{background:none;border:none;cursor:pointer;color:#c8cfe0;font-size:13px;padding:1px 3px;border-radius:4px;display:inline-flex;align-items:center}
.inline-edit-btn:hover{color:#534AB7;background:#EEEDFE}

/* ── ICON PICKER ── */
.icon-grid{display:flex;flex-wrap:wrap;gap:4px}
.icon-opt{width:30px;height:30px;display:flex;align-items:center;justify-content:center;border-radius:6px;border:1.5px solid #e8ecf4;background:#fff;cursor:pointer;font-size:15px;color:#5a6478;transition:all 0.1s}
.icon-opt:hover{border-color:#534AB7;color:#534AB7}
.icon-opt.sel{background:#EEEDFE;border-color:#534AB7;color:#534AB7}

/* ── COLOR PICKER ── */
.color-row{display:flex;gap:6px;flex-wrap:wrap}
.color-opt{width:24px;height:24px;border-radius:50%;border:2.5px solid #e8ecf4;cursor:pointer;transition:border-color 0.1s}
.color-opt:hover{border-color:#1a1f2e}
.color-opt.sel{border-color:#1a1f2e;box-shadow:0 0 0 2px #fff,0 0 0 4px #534AB7}

/* ── CATEGORY LIST ── */
.cat-list{display:flex;flex-direction:column;gap:6px;max-height:260px;overflow-y:auto;margin-bottom:12px}
.cat-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:8px;border:1px solid #e8ecf4;background:#fafbfd;font-size:12px}
.cat-item .cat-name{flex:1;font-weight:500}
.cat-item-actions{display:flex;gap:2px}
.modal-wide{width:420px}

/* ── RESPONSIVE ── */
@media(max-width:700px){
  .topbar{padding:10px 14px;flex-wrap:wrap;gap:8px}
  .topbar-left{width:100%;justify-content:space-between}
  .topbar-right{width:100%;justify-content:flex-end}
  .content{padding:12px 10px;height:calc(100vh - 90px)}
  .metrics{grid-template-columns:repeat(2,1fr);gap:8px}
  .mc{padding:11px 13px}
  .mc-value{font-size:17px}
  table.data-tbl th,table.data-tbl td{padding:7px 8px}
  .cal-grid-wrap{grid-template-columns:1fr;padding:10px}
  .setup-card{padding:24px 20px}
}
</style>
</head>
<body>

<!-- SETUP SCREEN (shown if no Supabase config) -->
<div class="setup-screen" id="setup-screen" style="display:none">
  <div class="setup-card">
    <h2><div class="logo-icon" style="width:26px;height:26px"><i class="ti ti-target" style="font-size:14px;color:#fff"></i></div> Connect to Supabase</h2>
    <div class="sub">Enter your Supabase project credentials to get started.<br>Find them in your Supabase dashboard under <strong>Settings &rarr; API</strong>.</div>
    <div class="form-group">
      <label>Project URL</label>
      <input id="s-url" type="url" placeholder="https://your-project.supabase.co" autocomplete="off">
      <div class="hint">e.g. https://abcdefg.supabase.co</div>
    </div>
    <div class="form-group" style="margin-bottom:0">
      <label>Anon / Public Key</label>
      <input id="s-key" type="text" placeholder="eyJhbGciOi..." autocomplete="off">
      <div class="hint">The "anon public" key (safe for client-side use)</div>
    </div>
    <div class="setup-error" id="setup-error"></div>
    <div class="modal-actions" style="margin-top:18px">
      <button class="btn-primary" onclick="connectSupabase()" id="s-connect"><i class="ti ti-plug"></i> Connect</button>
    </div>
  </div>
</div>

<!-- MAIN APP -->
<div id="app-shell" style="display:none">
  <div class="topbar">
    <div class="topbar-left">
      <div class="logo">
        <div class="logo-icon"><i class="ti ti-target"></i></div>
        <span class="logo-text">Habits & tracking</span>
      </div>
      <span class="period-hint" id="period-hint"></span>
    </div>
    <div class="topbar-right">
      <div class="seg-control">
        <button class="seg-btn active" id="btn-table" onclick="switchView('table',this)"><i class="ti ti-table" style="font-size:12px"></i> Table</button>
        <button class="seg-btn" id="btn-cal" onclick="switchView('calendar',this)"><i class="ti ti-calendar" style="font-size:12px"></i> Calendar</button>
      </div>
      <button class="edit-btn" id="edit-btn" onclick="toggleEditMode()"><i class="ti ti-pencil" style="font-size:12px"></i> Edit</button>
      <button class="edit-btn" id="cat-btn" onclick="openCategoryModal()" style="display:none"><i class="ti ti-category" style="font-size:12px"></i> Categories</button>
      <button class="btn-primary" onclick="openModal()"><i class="ti ti-plus"></i> New item</button>
      <button class="gear-btn" onclick="showDisconnect()" title="Settings"><i class="ti ti-settings"></i></button>
    </div>
  </div>

  <div class="content">
    <div class="metrics" id="metrics-row"></div>
    <div id="main-view"></div>
  </div>
</div>

<div id="modal-container"></div>
<div class="toast" id="toast"></div>

<script>
// ── CONSTANTS ────────────────────────────────────────────────────────
const COLOR_THEMES = {
  green:  {chip:'rgba(29,158,117,0.13)', chipB:'rgba(29,158,117,0.28)', chipT:'#0f6e56'},
  purple: {chip:'rgba(83,74,183,0.13)',  chipB:'rgba(83,74,183,0.28)',  chipT:'#3C3489'},
  blue:   {chip:'rgba(93,152,179,0.13)', chipB:'rgba(93,152,179,0.28)', chipT:'#1a5e78'},
  orange: {chip:'rgba(186,117,23,0.13)', chipB:'rgba(186,117,23,0.28)', chipT:'#7a4c0a'},
  pink:   {chip:'rgba(212,83,126,0.13)', chipB:'rgba(212,83,126,0.28)', chipT:'#993556'},
  olive:  {chip:'rgba(99,153,34,0.13)',  chipB:'rgba(99,153,34,0.28)',  chipT:'#3B6D11'},
  gray:   {chip:'rgba(136,135,128,0.13)',chipB:'rgba(136,135,128,0.28)',chipT:'#5F5E5A'},
  red:    {chip:'rgba(226,75,74,0.13)',  chipB:'rgba(226,75,74,0.28)',  chipT:'#b52d2c'},
};
const ICON_OPTIONS = [
  'ti-heart','ti-star','ti-book','ti-run','ti-brain','ti-coin','ti-briefcase','ti-check',
  'ti-home','ti-music','ti-camera','ti-palette','ti-code','ti-plant','ti-coffee',
  'ti-sun','ti-moon','ti-trophy','ti-target','ti-flame','ti-bike','ti-yoga','ti-pill',
  'ti-pencil','ti-users','ti-phone','ti-car','ti-plane','ti-clock','ti-bulb',
];
const DOW = ['Su','Mo','Tu','We','Th','Fr','Sa'];
const MONTHS_SHORT = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const FALLBACK_CAT = {icon:'ti-check', chip:'rgba(136,135,128,0.13)', chipB:'rgba(136,135,128,0.28)', chipT:'#5F5E5A'};
const DEFAULT_HABIT_TARGET = 5;

// ── STATE ────────────────────────────────────────────────────────────
let sb = null;
let habits = [];
let categories = [];
let CATS = {};
let entriesMap = {};
let currentView = 'table';
let busy = false;
let editMode = false;
let schemaSupportsItemTypes = true;
let schemaMigrationError = '';

function buildCats(){
  CATS = {};
  for(const c of categories){
    const theme = COLOR_THEMES[c.color_key] || COLOR_THEMES.gray;
    CATS[c.name] = { icon: c.icon, ...theme };
  }
}

// ── HELPERS ──────────────────────────────────────────────────────────
function fmtKey(d){ return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function todayKey(){ return fmtKey(new Date()); }
function parseDateKey(key){
  const [y,m,d] = String(key).split('-').map(Number);
  return new Date(y, (m || 1) - 1, d || 1);
}
function weekKeys(){
  const t=new Date(), dow=t.getDay();
  return Array.from({length:7},(_,i)=>{ const d=new Date(t); d.setDate(t.getDate()-dow+i); return fmtKey(d); });
}
function rollingDayKeys(days){
  const t = new Date();
  return Array.from({length:days}, (_, i) => {
    const d = new Date(t);
    d.setDate(t.getDate() - (days - 1 - i));
    return fmtKey(d);
  });
}
function normalizeTarget(value){
  const n = Number(value);
  return Number.isInteger(n) && n > 0 ? n : DEFAULT_HABIT_TARGET;
}
function normalizeItem(item){
  const type = item?.type === 'tracking' ? 'tracking' : 'habit';
  return {
    ...item,
    description: item?.description || '',
    type,
    target: type === 'habit' ? normalizeTarget(item?.target) : null,
  };
}
function habitItems(){ return habits.filter(h => h.type === 'habit'); }
function isTrackingItem(item){ return item.type === 'tracking'; }
function getStreak(habitId){
  const logs = entriesMap[habitId] || {};
  const t=new Date(); let s=0;
  for(let i=0;i<400;i++){
    const d=new Date(t); d.setDate(d.getDate()-i);
    if(logs[fmtKey(d)]) s++; else if(i>0) break;
  }
  return s;
}
function countLogsForKeys(itemId, keys){
  const logs = entriesMap[itemId] || {};
  return keys.reduce((sum, key) => sum + (logs[key] ? 1 : 0), 0);
}
function countLogsThisWeek(itemId){
  const today = todayKey();
  return weekKeys().filter(key => key <= today).reduce((sum, key) => sum + ((entriesMap[itemId] || {})[key] ? 1 : 0), 0);
}
function getLastLoggedKey(itemId){
  const logs = entriesMap[itemId] || {};
  const keys = Object.keys(logs).filter(key => logs[key]).sort();
  return keys.length ? keys[keys.length - 1] : '';
}
function formatLastLogged(itemId){
  const key = getLastLoggedKey(itemId);
  if(!key) return 'Not logged yet';
  if(key === todayKey()) return 'Last logged today';
  const date = parseDateKey(key);
  return `Last logged on ${MONTHS_SHORT[date.getMonth()]} ${date.getDate()}`;
}
function getWeeklyTargetSummary(item){
  const completed = countLogsThisWeek(item.id);
  return `${completed} / ${normalizeTarget(item.target)} this week`;
}
function getTrackingSummary(item){
  const count = countLogsForKeys(item.id, rollingDayKeys(7));
  return `Logged ${count} time${count === 1 ? '' : 's'} in the last 7 days`;
}
function targetFieldHTML(type, target){
  const isTracking = type === 'tracking';
  return `<div class="form-group" id="m-target-group">
    <label>Weekly target</label>
    <input id="m-target" type="number" min="1" step="1" value="${isTracking ? '' : normalizeTarget(target)}" ${isTracking ? 'disabled' : ''} placeholder="${DEFAULT_HABIT_TARGET}">
  </div>`;
}
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function showToast(msg, isError){
  const el=document.getElementById('toast');
  el.textContent=msg;
  el.style.background=isError?'#E24B4A':'#1a1f2e';
  el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'), 3000);
}
function requiresTypedSchema(){
  return !schemaSupportsItemTypes;
}
function getSchemaWarningHTML(){
  if(!schemaMigrationError) return '';
  return `<div class="notice-banner"><strong>Database migration needed.</strong> Run the updated <code>setup.sql</code> in Supabase to add the <code>type</code> and <code>target</code> columns for habits and tracking logs.<br>${esc(schemaMigrationError)}</div>`;
}
function showSchemaMigrationToast(){
  showToast('Run the updated setup.sql in Supabase to add the type and target columns.', true);
}

// ── CONFIG ───────────────────────────────────────────────────────────
function loadConfig(){
  const url = localStorage.getItem('ht_sb_url') || '';
  const key = localStorage.getItem('ht_sb_key') || '';
  return { url, key };
}

function saveConfig(url, key){
  localStorage.setItem('ht_sb_url', url);
  localStorage.setItem('ht_sb_key', key);
}

function clearConfig(){
  localStorage.removeItem('ht_sb_url');
  localStorage.removeItem('ht_sb_key');
}

// ── SUPABASE CONNECTION ──────────────────────────────────────────────
async function connectSupabase(){
  const url = (document.getElementById('s-url').value || '').trim().replace(/\/$/,'');
  const key = (document.getElementById('s-key').value || '').trim();
  const errEl = document.getElementById('setup-error');

  if(!url || !key){
    errEl.textContent = 'Please enter both the project URL and anon key.';
    errEl.style.display = 'block';
    return;
  }

  const btn = document.getElementById('s-connect');
  btn.innerHTML = '<div class="spinner" style="width:14px;height:14px;border-width:2px"></div> Connecting...';
  btn.disabled = true;
  errEl.style.display = 'none';

  try {
    const client = window.supabase.createClient(url, key);
    const { error } = await client.from('habits').select('id').limit(1);
    if(error) throw new Error(error.message);

    sb = client;
    saveConfig(url, key);
    document.getElementById('setup-screen').style.display = 'none';
    document.getElementById('app-shell').style.display = '';
    await loadDataAndRender();
  } catch(e) {
    errEl.textContent = 'Connection failed: ' + e.message;
    errEl.style.display = 'block';
  } finally {
    btn.innerHTML = '<i class="ti ti-plug"></i> Connect';
    btn.disabled = false;
  }
}

function showDisconnect(){
  document.getElementById('modal-container').innerHTML = `
    <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal" role="dialog" aria-modal="true">
        <h2><i class="ti ti-settings" style="font-size:14px;color:#534AB7"></i> Settings</h2>
        <p style="font-size:12px;color:#5a6478;margin-bottom:14px">Connected to Supabase. You can disconnect and re-enter your credentials if needed.</p>
        <div class="modal-actions">
          <button class="btn-secondary" onclick="closeModal()">Cancel</button>
          <button class="btn-primary" style="background:#E24B4A;border-color:#E24B4A" onclick="doDisconnect()"><i class="ti ti-plug-off"></i> Disconnect</button>
        </div>
      </div>
    </div>`;
}

function doDisconnect(){
  clearConfig();
  sb = null;
  habits = [];
  entriesMap = {};
  closeModal();
  document.getElementById('app-shell').style.display = 'none';
  document.getElementById('setup-screen').style.display = '';
}

// ── DATA LOADING ─────────────────────────────────────────────────────
async function loadDataAndRender(){
  document.getElementById('main-view').innerHTML = '<div class="loading-screen"><div class="spinner"></div><span>Loading items...</span></div>';
  document.getElementById('metrics-row').innerHTML = '';

  try {
    schemaSupportsItemTypes = true;
    schemaMigrationError = '';
    const { error: schemaErr } = await sb.from('habits').select('id,type,target').limit(1);
    if(schemaErr){
      schemaSupportsItemTypes = false;
      schemaMigrationError = schemaErr.message;
    }

    const { data: catData, error: cErr } = await sb
      .from('categories')
      .select('*')
      .order('sort_order', { ascending: true, nullsFirst: false })
      .order('name', { ascending: true });
    if(cErr) throw new Error(cErr.message);
    categories = catData || [];
    buildCats();

    const { data: habitsData, error: hErr } = await sb
      .from('habits')
      .select('*')
      .eq('is_active', true)
      .order('sort_order', { ascending: true, nullsFirst: false })
      .order('created_at', { ascending: true });

    if(hErr) throw new Error(hErr.message);
    habits = (habitsData || []).map(normalizeItem);

    entriesMap = {};
    for(const h of habits) entriesMap[h.id] = {};

    if(habits.length){
      const ids = habits.map(h => h.id);
      const { data: entries, error: eErr } = await sb
        .from('habit_entries')
        .select('habit_id, entry_date')
        .in('habit_id', ids);

      if(eErr) throw new Error(eErr.message);
      for(const e of (entries || [])){
        if(entriesMap[e.habit_id]) entriesMap[e.habit_id][e.entry_date] = true;
      }
    }

    render();
  } catch(e) {
    document.getElementById('main-view').innerHTML =
      `<div class="empty-state"><i class="ti ti-alert-triangle"></i><p>Error loading data: ${esc(e.message)}</p></div>`;
    showToast('Failed to load data', true);
  }
}

// ── TOGGLE DAY ───────────────────────────────────────────────────────
async function toggleDay(id, key){
  const today = todayKey();
  if(key > today || busy) return;
  const logs = entriesMap[id];
  if(!logs) return;

  busy = true;
  try {
    if(logs[key]){
      const { error } = await sb.from('habit_entries')
        .delete()
        .eq('habit_id', id)
        .eq('entry_date', key);
      if(error) throw new Error(error.message);
      delete logs[key];
    } else {
      const { error } = await sb.from('habit_entries')
        .insert({ habit_id: id, entry_date: key, is_done: true });
      if(error) throw new Error(error.message);
      logs[key] = true;
    }
    render();
  } catch(e){
    showToast('Error: ' + e.message, true);
  } finally {
    busy = false;
  }
}

// ── CREATE HABIT ─────────────────────────────────────────────────────
async function createItem({ name, desc, category, type, target }){
  try {
    const { data, error } = await sb.from('habits')
      .insert({ name, description: desc, category, type, target: type === 'habit' ? normalizeTarget(target) : null, is_active: true })
      .select()
      .single();
    if(error) throw new Error(error.message);
    habits.push(normalizeItem(data));
    entriesMap[data.id] = {};
    render();
    showToast(type === 'tracking' ? 'Tracking log created' : 'Habit created');
  } catch(e){
    showToast('Error: ' + e.message, true);
  }
}

// ── DELETE HABIT ─────────────────────────────────────────────────────
async function deleteHabit(id){
  const item = habits.find(h => h.id === id);
  if(!item) return;
  if(!confirm(`Hide this ${item.type === 'tracking' ? 'tracking log' : 'habit'}? Historical records will be preserved.`)) return;
  try {
    const { error } = await sb.from('habits')
      .update({ is_active: false, updated_at: new Date().toISOString() })
      .eq('id', id);
    if(error) throw new Error(error.message);
    habits = habits.filter(h => h.id !== id);
    delete entriesMap[id];
    render();
    showToast(item.type === 'tracking' ? 'Tracking log hidden' : 'Habit hidden');
  } catch(e){
    showToast('Error: ' + e.message, true);
  }
}

// ── EDIT MODE ────────────────────────────────────────────────────────
function toggleEditMode(){
  editMode = !editMode;
  const btn = document.getElementById('edit-btn');
  const catBtn = document.getElementById('cat-btn');
  if(editMode){
    btn.classList.add('active');
    btn.innerHTML = '<i class="ti ti-check" style="font-size:12px"></i> Done';
    catBtn.style.display = '';
  } else {
    btn.classList.remove('active');
    btn.innerHTML = '<i class="ti ti-pencil" style="font-size:12px"></i> Edit';
    catBtn.style.display = 'none';
  }
  render();
}

async function moveHabit(id, dir){
  if(busy) return;
  const idx = habits.findIndex(h => h.id === id);
  const newIdx = idx + dir;
  if(newIdx < 0 || newIdx >= habits.length) return;

  busy = true;
  [habits[idx], habits[newIdx]] = [habits[newIdx], habits[idx]];
  render();

  try {
    const { error: e1 } = await sb.from('habits').update({ sort_order: idx, updated_at: new Date().toISOString() }).eq('id', habits[idx].id);
    if(e1) throw new Error(e1.message);
    const { error: e2 } = await sb.from('habits').update({ sort_order: newIdx, updated_at: new Date().toISOString() }).eq('id', habits[newIdx].id);
    if(e2) throw new Error(e2.message);
    habits[idx].sort_order = idx;
    habits[newIdx].sort_order = newIdx;
  } catch(e){
    [habits[idx], habits[newIdx]] = [habits[newIdx], habits[idx]];
    render();
    showToast('Error reordering: ' + e.message, true);
  } finally {
    busy = false;
  }
}

function switchView(view, el){

  document.querySelectorAll('.seg-btn').forEach(b => b.classList.remove('active'));

// ── RENDER ───────────────────────────────────────────────────────────
function render(){
  const d = new Date();
  document.getElementById('period-hint').textContent =
    d.toLocaleDateString('en-US',{weekday:'long', month:'long', day:'numeric', year:'numeric'});
  renderMetrics();
  if(currentView === 'table') renderTable();
  else renderCalendar();
}

// ── METRICS ──────────────────────────────────────────────────────────
function renderMetrics(){
  const trackedHabits = habitItems();
  const today = todayKey();
  const done = trackedHabits.filter(h => (entriesMap[h.id] || {})[today]).length;
  const total = trackedHabits.length;
  const pct = total ? Math.round((done/total)*100) : 0;
  const best = trackedHabits.reduce((m, h) => Math.max(m, getStreak(h.id)), 0);
  const wk = weekKeys();
  const wkPast = wk.filter(k => k <= today);
  const wkDone = wkPast.reduce((s, k) => s + trackedHabits.filter(h => (entriesMap[h.id] || {})[k]).length, 0);
  const wkMax = wkPast.length * total;
  const wkPct = wkMax ? Math.round((wkDone/wkMax)*100) : 0;
  const progressSub = total ? (done===total&&total>0?'All done!':'Keep going') : 'Tracking logs are shown below';
  document.getElementById('metrics-row').innerHTML = `
    <div class="mc"><div class="mc-label">Completed today</div><div class="mc-value">${done} / ${total}</div><div class="mc-sub">${total ? `${pct}% of habits` : 'No habits yet'}</div></div>
    <div class="mc"><div class="mc-label">Today's progress</div><div class="mc-value" style="color:${pct===100&&total>0?'#0f6e56':'#1a1f2e'}">${pct}%</div><div class="mc-sub">${progressSub}</div></div>
    <div class="mc"><div class="mc-label">Best streak</div><div class="mc-value">${best}</div><div class="mc-sub">days in a row</div></div>
    <div class="mc"><div class="mc-label">Weekly check-ins</div><div class="mc-value">${wkPct}%</div><div class="mc-sub">${wkMax ? `${wkDone} of ${wkMax} habit check-ins` : 'Tracking logs excluded'}</div></div>`;
}

// ── TABLE VIEW ───────────────────────────────────────────────────────
function renderTable(){
  if(!habits.length){ document.getElementById('main-view').innerHTML = emptyHTML(); return; }
  const habitRows = renderTableSectionRows(habitItems(), false);
  const trackingRows = renderTableSectionRows(habits.filter(h => h.type === 'tracking'), true);
  const sections = [
    renderTableSection('Habits', habitItems().length, habitRows),
    renderTableSection('Tracking logs', habits.filter(h => h.type === 'tracking').length, trackingRows),
  ].join('');
  document.getElementById('main-view').innerHTML = `
    ${getSchemaWarningHTML()}
    <div class="section-stack">${sections}</div>`;
}

function renderTableSectionRows(items, isTrackingSection){
  const today = todayKey(), week = weekKeys();
  return items.map((h) => {
    const cat = CATS[h.category] || FALLBACK_CAT;
    const logs = entriesMap[h.id] || {};
    const isDone = !!logs[today];
    const streak = getStreak(h.id);
    const summaryPrimary = isTrackingSection ? getTrackingSummary(h) : getWeeklyTargetSummary(h);
    const summarySecondary = isTrackingSection ? formatLastLogged(h.id) : `${streak} day${streak === 1 ? '' : 's'} streak`;
    const dots = week.map((k, i) => {
      const d = !!logs[k], isT = k===today, isFut = k>today;
      let cls = 'wd'; if(d) cls += ' wdd'; if(isT) cls += ' wdt'; if(isFut) cls += ' wdf';
      const click = isFut ? '' : `onclick="toggleDay('${h.id}','${k}')"`;
      return `<div class="${cls}" ${click} title="${isFut ? DOW[i] : (d ? `${DOW[i]} — ${isTrackingSection ? 'remove log' : 'undo'}` : `${DOW[i]} — ${isTrackingSection ? 'log date' : 'mark done'}`)}"></div>`;
    }).join('');
    const cs = `background:${cat.chip};border-color:${cat.chipB};color:${cat.chipT}`;
    const globalIdx = habits.findIndex(item => item.id === h.id);
    const moveCol = editMode ? `<td><div class="move-col">
      <button class="move-btn" onclick="moveHabit('${h.id}',-1)" ${globalIdx===0?'disabled':''}  title="Move up"><i class="ti ti-chevron-up"></i></button>
      <button class="move-btn" onclick="moveHabit('${h.id}',1)"  ${globalIdx===habits.length-1?'disabled':''} title="Move down"><i class="ti ti-chevron-down"></i></button>
    </div></td>` : '';
    const delCol = editMode ? `<td><button onclick="deleteHabit('${h.id}')" style="background:none;border:none;cursor:pointer;color:#c8cfe0;font-size:15px;padding:3px 5px;border-radius:5px" title="Delete" onmouseover="this.style.color='#E24B4A'" onmouseout="this.style.color='#c8cfe0'"><i class="ti ti-trash"></i></button></td>` : '';
    return `<tr>
      ${moveCol}
      <td><div class="item-meta"><div class="item-name-row" style="font-weight:600;white-space:nowrap"><i class="ti ${cat.icon}" style="font-size:14px;color:${cat.chipT}"></i>${esc(h.name)}${editMode?`<button class="inline-edit-btn" onclick="openEditHabitModal('${h.id}')" title="Edit item"><i class="ti ti-pencil"></i></button>`:''}</div></div></td>
      <td style="color:#5a6478;font-size:12px">${esc(h.description||'')}</td>
      <td><button class="done-btn${isDone?' is-done':''}" onclick="toggleDay('${h.id}','${today}')">${isDone?`<i class="ti ti-check" style="font-size:11px"></i> ${isTrackingSection ? 'Logged' : 'Done'}`:(isTrackingSection ? 'Log today' : 'Mark done')}</button></td>
      <td><div class="week-col"><div class="week-lbl-row">${DOW.map(d=>`<span class="wl">${d}</span>`).join('')}</div><div class="week-dots">${dots}</div></div></td>
      <td><div class="item-summary"><strong>${esc(summaryPrimary)}</strong><span>${esc(summarySecondary)}</span></div></td>
      <td><span class="chip" style="${cs}">${esc(h.category)}</span></td>
      ${delCol}
    </tr>`;
  }).join('');
}

function renderTableSection(title, count, rows){
  const thMove = editMode ? '<th></th>' : '';
  const thDel = editMode ? '<th></th>' : '';
  if(!count){
    return `<div class="section-block">
      <div class="section-head">
        <div class="section-title">${esc(title)}</div>
        <div class="section-count">0 items</div>
      </div>
      <div class="card"><div class="empty-state" style="padding:22px 18px"><p>${title === 'Habits' ? 'No habits yet.' : 'No tracking logs yet.'}</p></div></div>
    </div>`;
  }
  return `<div class="section-block">
      <div class="section-head">
        <div class="section-title">${esc(title)}</div>
        <div class="section-count">${count} item${count === 1 ? '' : 's'}</div>
      </div>
    <div class="card" style="padding:0 0 4px">
      <div class="tbl-wrap">
        <table class="data-tbl">
          <thead><tr>${thMove}<th>Item</th><th>Description</th><th>Today</th><th>Current week</th><th>Summary</th><th>Category</th>${thDel}</tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>
  </div>`;
}

// ── CALENDAR VIEW ────────────────────────────────────────────────────
function renderCalendar(){
  if(!habits.length){ document.getElementById('main-view').innerHTML = emptyHTML(); return; }
  const now = new Date(), year = now.getFullYear(), month = now.getMonth();
  const dim = new Date(year, month+1, 0).getDate();
  const firstDow = new Date(year, month, 1).getDay();
  const today = todayKey();
  const sections = [
    renderCalendarSection('Habits', habitItems(), false, year, month, dim, firstDow, today),
    renderCalendarSection('Tracking logs', habits.filter(h => h.type === 'tracking'), true, year, month, dim, firstDow, today),
  ].join('');
  document.getElementById('main-view').innerHTML = `${getSchemaWarningHTML()}<div class="section-stack">${sections}</div>`;
}

function renderCalendarSection(title, items, isTrackingSection, year, month, dim, firstDow, today){
  if(!items.length){
    return `<div class="section-block">
      <div class="section-head">
        <div class="section-title">${esc(title)}</div>
        <div class="section-count">0 items</div>
      </div>
      <div class="card"><div class="empty-state" style="padding:22px 18px"><p>${title === 'Habits' ? 'No habits yet.' : 'No tracking logs yet.'}</p></div></div>
    </div>`;
  }
  const cards = items.map((h) => {
    const cat = CATS[h.category] || FALLBACK_CAT;
    const logs = entriesMap[h.id] || {};
    const streak = getStreak(h.id);
    const isDone = !!logs[today];
    const cs = `background:${cat.chip};border-color:${cat.chipB};color:${cat.chipT}`;
    const dowRow = DOW.map(d => `<div class="cal-dow">${d}</div>`).join('');
    let cells = '';
    for(let i=0; i<firstDow; i++) cells += `<div class="cd cde"></div>`;
    for(let d=1; d<=dim; d++){
      const key = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const done = !!logs[key], isT = key===today, isFut = key>today;
      let cls = 'cd';
      if(done) cls += isTrackingSection ? ' cdd-tracking' : ' cdd';
      if(isT) cls += ' cdt';
      if(isFut) cls += ' cdf';
      const click = isFut ? '' : `onclick="toggleDay('${h.id}','${key}')"`;
      cells += `<div class="${cls}" ${click} title="${isFut?'':(done?(isTrackingSection ? 'Remove log' : 'Undo'):(isTrackingSection ? 'Log date' : 'Mark done'))}">${d}</div>`;
    }
    const globalIdx = habits.findIndex(item => item.id === h.id);
    return `<div class="hcard">
      <div class="hcard-hdr">
        <div class="hcard-title"><i class="ti ${cat.icon}" style="color:${cat.chipT}"></i>${esc(h.name)}${editMode?`<button class="inline-edit-btn" onclick="openEditHabitModal('${h.id}')" title="Edit"><i class="ti ti-pencil"></i></button>`:''}</div>
        <button class="done-btn${isDone?' is-done':''}" onclick="toggleDay('${h.id}','${today}')" style="font-size:11px;padding:3px 9px">${isDone?`<i class="ti ti-check" style="font-size:11px"></i> ${isTrackingSection ? 'Logged' : 'Done'}`:(isTrackingSection ? 'Log today' : 'Mark done')}</button>
      </div>
      <div class="cal-lbl">${MONTHS_SHORT[month]} ${year} &nbsp;&middot;&nbsp; <span class="chip" style="${cs};font-size:10px;padding:1px 7px">${esc(h.category)}</span></div>
      <div class="cal-dow-row">${dowRow}</div>
      <div class="cal-grid">${cells}</div>
      <div class="hcard-streak">${isTrackingSection ? `<span class="tracking-ico"><i class="ti ti-clock"></i></span><strong>${esc(getTrackingSummary(h))}</strong> ${esc(formatLastLogged(h.id))}` : `<span style="color:#E24B4A">&#x1f525;</span><strong>${esc(getWeeklyTargetSummary(h))}</strong> ${streak} day${streak === 1 ? '' : 's'} streak`}
        ${editMode ? `<div class="hcard-edit-bar">
          <button class="move-btn" onclick="moveHabit('${h.id}',-1)" ${globalIdx===0?'disabled':''} title="Move up"><i class="ti ti-chevron-up"></i></button>
          <button class="move-btn" onclick="moveHabit('${h.id}',1)" ${globalIdx===habits.length-1?'disabled':''} title="Move down"><i class="ti ti-chevron-down"></i></button>
          <button onclick="deleteHabit('${h.id}')" style="background:none;border:none;cursor:pointer;color:#c8cfe0;font-size:13px;padding:2px" title="Delete" onmouseover="this.style.color='#E24B4A'" onmouseout="this.style.color='#c8cfe0'"><i class="ti ti-trash"></i></button>
        </div>` : ''}
      </div>
    </div>`;
  }).join('');
  return `<div class="section-block">
    <div class="section-head">
      <div class="section-title">${esc(title)}</div>
      <div class="section-count">${items.length} item${items.length === 1 ? '' : 's'}</div>
    </div>
    <div class="cal-grid-wrap">${cards}</div>
  </div>`;
}

function emptyHTML(){
  return `${getSchemaWarningHTML()}<div class="empty-state"><i class="ti ti-target"></i><p>No items yet — click <strong>New item</strong> to add a habit or tracking log.</p></div>`;
}

// ── HABIT MODAL (new + edit) ─────────────────────────────────────────
function catOptions(selected){
  return categories.map(c => `<option${c.name===selected?' selected':''}>${esc(c.name)}</option>`).join('');
}
function typeOptions(selected){
  return `
    <option value="habit"${selected === 'habit' ? ' selected' : ''}>Habit</option>
    <option value="tracking"${selected === 'tracking' ? ' selected' : ''}>Tracking log</option>
  `;
}
function syncTypeFields(){
  const typeEl = document.getElementById('m-type');
  const group = document.getElementById('m-target-group');
  const input = document.getElementById('m-target');
  if(!typeEl || !group || !input) return;
  const isTracking = typeEl.value === 'tracking';
  group.style.display = isTracking ? 'none' : '';
  input.disabled = isTracking;
  if(isTracking){
    input.value = '';
  } else if(!input.value){
    input.value = String(DEFAULT_HABIT_TARGET);
  }
}

function openModal(){
  document.getElementById('modal-container').innerHTML = `
    <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal" role="dialog" aria-modal="true">
        <h2><i class="ti ti-plus" style="font-size:14px;color:#534AB7"></i>New item</h2>
        <div class="form-group"><label>Type</label><select id="m-type" onchange="syncTypeFields()">${typeOptions('habit')}</select></div>
        <div class="form-group"><label>Name</label><input id="m-name" type="text" placeholder="e.g. Morning run" maxlength="50" autocomplete="off"></div>
        <div class="form-group"><label>Description <span style="text-transform:none;letter-spacing:0;font-weight:400">(optional)</span></label><input id="m-desc" type="text" placeholder="e.g. Run for 20 minutes" maxlength="100" autocomplete="off"></div>
        ${targetFieldHTML('habit', DEFAULT_HABIT_TARGET)}
        <div class="form-group" style="margin-bottom:0"><label>Category</label><select id="m-cat">${catOptions('')}</select></div>
        <div class="modal-actions">
          <button class="btn-secondary" onclick="closeModal()">Cancel</button>
          <button class="btn-primary" id="m-save" onclick="saveModal()"><i class="ti ti-check"></i> Save item</button>
        </div>
      </div>
    </div>`;
  setTimeout(() => {
    const el = document.getElementById('m-name');
    syncTypeFields();
    if(el){ el.focus(); el.addEventListener('keydown', e => { if(e.key==='Enter') saveModal(); }); }
  }, 60);
}

function openEditHabitModal(id){
  const h = habits.find(x => x.id === id);
  if(!h) return;
  document.getElementById('modal-container').innerHTML = `
    <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal" role="dialog" aria-modal="true">
        <h2><i class="ti ti-pencil" style="font-size:14px;color:#534AB7"></i>Edit item</h2>
        <div class="form-group"><label>Type</label><select id="m-type" onchange="syncTypeFields()">${typeOptions(h.type)}</select></div>
        <div class="form-group"><label>Name</label><input id="m-name" type="text" value="${esc(h.name)}" maxlength="50" autocomplete="off"></div>
        <div class="form-group"><label>Description <span style="text-transform:none;letter-spacing:0;font-weight:400">(optional)</span></label><input id="m-desc" type="text" value="${esc(h.description||'')}" maxlength="100" autocomplete="off"></div>
        ${targetFieldHTML(h.type, h.target)}
        <div class="form-group" style="margin-bottom:0"><label>Category</label><select id="m-cat">${catOptions(h.category)}</select></div>
        <div class="modal-actions">
          <button class="btn-secondary" onclick="closeModal()">Cancel</button>
          <button class="btn-primary" id="m-save" onclick="saveEditHabit('${h.id}')"><i class="ti ti-check"></i> Save</button>
        </div>
      </div>
    </div>`;
  setTimeout(() => {
    syncTypeFields();
    document.getElementById('m-name')?.focus();
  }, 60);
}

async function saveEditHabit(id){
  const name = (document.getElementById('m-name').value || '').trim();
  if(!name){ document.getElementById('m-name').focus(); return; }
  const type = document.getElementById('m-type').value === 'tracking' ? 'tracking' : 'habit';
  const targetValue = document.getElementById('m-target').value;
  if(requiresTypedSchema()){
    showSchemaMigrationToast();
    return;
  }
  if(type === 'habit' && (!targetValue || Number(targetValue) < 1)){
    document.getElementById('m-target').focus();
    return;
  }
  const btn = document.getElementById('m-save');
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner" style="width:12px;height:12px;border-width:2px"></div> Saving...';
  try {
    const updates = {
      name,
      description: (document.getElementById('m-desc').value || '').trim(),
      type,
      target: type === 'habit' ? normalizeTarget(targetValue) : null,
      category: document.getElementById('m-cat').value,
      updated_at: new Date().toISOString()
    };
    const { error } = await sb.from('habits').update(updates).eq('id', id);
    if(error) throw new Error(error.message);
    const h = habits.find(x => x.id === id);
    if(h) Object.assign(h, normalizeItem({ ...h, ...updates }));
    closeModal();
    render();
    showToast(type === 'tracking' ? 'Tracking log updated' : 'Habit updated');
  } catch(e){
    showToast('Error: ' + e.message, true);
    btn.disabled = false;
    btn.innerHTML = '<i class="ti ti-check"></i> Save';
  }
}

function closeModal(){ document.getElementById('modal-container').innerHTML = ''; }

async function saveModal(){
  const name = (document.getElementById('m-name').value || '').trim();
  if(!name){ document.getElementById('m-name').focus(); return; }
  const type = document.getElementById('m-type').value === 'tracking' ? 'tracking' : 'habit';
  const targetValue = document.getElementById('m-target').value;
  if(requiresTypedSchema()){
    showSchemaMigrationToast();
    return;
  }
  if(type === 'habit' && (!targetValue || Number(targetValue) < 1)){
    document.getElementById('m-target').focus();
    return;
  }
  const btn = document.getElementById('m-save');
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner" style="width:12px;height:12px;border-width:2px"></div> Saving...';

  await createItem({
    name,
    desc: (document.getElementById('m-desc').value || '').trim(),
    category: document.getElementById('m-cat').value,
    type,
    target: type === 'habit' ? targetValue : null,
  });
  closeModal();
}

// ── CATEGORY MANAGEMENT ─────────────────────────────────────────────
function openCategoryModal(){
  renderCategoryModal();
}

function renderCategoryModal(editId){
  const editing = editId ? categories.find(c => c.id === editId) : null;
  const list = categories.map(c => {
    const theme = COLOR_THEMES[c.color_key] || COLOR_THEMES.gray;
    const cs = `background:${theme.chip};border-color:${theme.chipB};color:${theme.chipT}`;
    return `<div class="cat-item">
      <i class="ti ${c.icon}" style="font-size:14px;color:${theme.chipT}"></i>
      <span class="cat-name">${esc(c.name)}</span>
      <span class="chip" style="${cs};font-size:10px;padding:1px 7px">${esc(c.color_key)}</span>
      <div class="cat-item-actions">
        <button class="inline-edit-btn" onclick="renderCategoryModal('${c.id}')" title="Edit"><i class="ti ti-pencil"></i></button>
        <button class="inline-edit-btn" onclick="deleteCategory('${c.id}')" title="Delete" onmouseover="this.style.color='#E24B4A'" onmouseout="this.style.color='#c8cfe0'"><i class="ti ti-trash"></i></button>
      </div>
    </div>`;
  }).join('');

  const selIcon = editing ? editing.icon : 'ti-check';
  const selColor = editing ? editing.color_key : 'green';
  const iconGrid = ICON_OPTIONS.map(ic =>
    `<div class="icon-opt${ic===selIcon?' sel':''}" onclick="pickCatIcon('${ic}')" title="${ic.replace('ti-','')}"><i class="ti ${ic}"></i></div>`
  ).join('');
  const colorRow = Object.entries(COLOR_THEMES).map(([key, t]) =>
    `<div class="color-opt${key===selColor?' sel':''}" style="background:${t.chipT}" onclick="pickCatColor('${key}')" title="${key}"></div>`
  ).join('');

  document.getElementById('modal-container').innerHTML = `
    <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal modal-wide" role="dialog" aria-modal="true">
        <h2><i class="ti ti-category" style="font-size:14px;color:#534AB7"></i> Manage categories</h2>
        <div class="cat-list">${list || '<p style="color:#8492a6;font-size:12px;text-align:center;padding:12px">No categories yet</p>'}</div>
        <div style="border-top:1px solid #e8ecf4;padding-top:14px">
          <div style="font-size:11px;font-weight:600;color:#5a6478;margin-bottom:8px;text-transform:uppercase;letter-spacing:0.04em">${editing ? 'Edit category' : 'Add category'}</div>
          <div class="form-group"><label>Name</label><input id="mc-name" type="text" value="${editing ? esc(editing.name) : ''}" maxlength="30" placeholder="e.g. Wellness" autocomplete="off"></div>
          <div class="form-group"><label>Icon</label><div class="icon-grid" id="mc-icon-grid">${iconGrid}</div><input type="hidden" id="mc-icon" value="${selIcon}"></div>
          <div class="form-group" style="margin-bottom:0"><label>Color</label><div class="color-row" id="mc-color-row">${colorRow}</div><input type="hidden" id="mc-color" value="${selColor}"></div>
        </div>
        <div class="modal-actions" style="margin-top:14px">
          <button class="btn-secondary" onclick="closeModal()">Close</button>
          ${editing ? `<button class="btn-primary" id="mc-save" onclick="saveCategoryEdit('${editing.id}')"><i class="ti ti-check"></i> Update</button>` :
          `<button class="btn-primary" id="mc-save" onclick="saveCategoryAdd()"><i class="ti ti-plus"></i> Add</button>`}
        </div>
      </div>
    </div>`;
}

function pickCatIcon(icon){
  document.getElementById('mc-icon').value = icon;
  document.querySelectorAll('#mc-icon-grid .icon-opt').forEach(el => {
    el.classList.toggle('sel', el.querySelector('i').classList.contains(icon));
  });
}

function pickCatColor(key){
  document.getElementById('mc-color').value = key;
  document.querySelectorAll('#mc-color-row .color-opt').forEach(el => {
    el.classList.toggle('sel', el.getAttribute('title') === key);
  });
}

async function saveCategoryAdd(){
  const name = (document.getElementById('mc-name').value || '').trim();
  if(!name){ document.getElementById('mc-name').focus(); return; }
  const icon = document.getElementById('mc-icon').value;
  const color_key = document.getElementById('mc-color').value;
  const btn = document.getElementById('mc-save');
  btn.disabled = true;
  try {
    const { data, error } = await sb.from('categories')
      .insert({ name, icon, color_key, sort_order: categories.length + 1 })
      .select().single();
    if(error) throw new Error(error.message);
    categories.push(data);
    buildCats();
    renderCategoryModal();
    showToast('Category added');
  } catch(e){
    showToast('Error: ' + e.message, true);
    btn.disabled = false;
  }
}

async function saveCategoryEdit(id){
  const name = (document.getElementById('mc-name').value || '').trim();
  if(!name){ document.getElementById('mc-name').focus(); return; }
  const icon = document.getElementById('mc-icon').value;
  const color_key = document.getElementById('mc-color').value;
  const btn = document.getElementById('mc-save');
  btn.disabled = true;
  try {
    const cat = categories.find(c => c.id === id);
    const oldName = cat ? cat.name : '';
    const { error } = await sb.from('categories').update({ name, icon, color_key }).eq('id', id);
    if(error) throw new Error(error.message);
    if(cat){ cat.name = name; cat.icon = icon; cat.color_key = color_key; }
    buildCats();
    if(oldName && oldName !== name){
      for(const h of habits){
        if(h.category === oldName){
          await sb.from('habits').update({ category: name }).eq('id', h.id);
          h.category = name;
        }
      }
    }
    renderCategoryModal();
    render();
    showToast('Category updated');
  } catch(e){
    showToast('Error: ' + e.message, true);
    btn.disabled = false;
  }
}

async function deleteCategory(id){
  const cat = categories.find(c => c.id === id);
  if(!cat) return;
  const inUse = habits.filter(h => h.category === cat.name).length;
  const msg = inUse
    ? `"${cat.name}" is used by ${inUse} item(s). They will be moved to the first available category. Delete?`
    : `Delete category "${cat.name}"?`;
  if(!confirm(msg)) return;
  try {
    const { error } = await sb.from('categories').delete().eq('id', id);
    if(error) throw new Error(error.message);
    categories = categories.filter(c => c.id !== id);
    buildCats();
    if(inUse){
      const fallback = categories.length ? categories[0].name : 'Other';
      for(const h of habits){
        if(h.category === cat.name){
          await sb.from('habits').update({ category: fallback }).eq('id', h.id);
          h.category = fallback;
        }
      }
    }
    renderCategoryModal();
    render();
    showToast('Category deleted');
  } catch(e){
    showToast('Error: ' + e.message, true);
  }
}

// ── INIT ─────────────────────────────────────────────────────────────
(async function init(){
  const { url, key } = loadConfig();
  if(url && key){
    try {
      sb = window.supabase.createClient(url, key);
      document.getElementById('app-shell').style.display = '';
      await loadDataAndRender();
    } catch(e){
      clearConfig();
      document.getElementById('setup-screen').style.display = '';
    }
  } else {
    document.getElementById('setup-screen').style.display = '';
  }
})();
</script>
